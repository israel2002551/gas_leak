<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live LPG MQTT Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .normal { background-color: #d4edda; color: #155724; }
        .warn { background-color: #fff3cd; color: #856404; animation: pulse 2s infinite; }
        .critical { background-color: #f8d7da; color: #721c24; border: 2px solid #dc3545; animation: blink 1s linear infinite; }
        .btn-reset { padding: 15px 40px; font-size: 18px; font-weight: bold; background-color: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3); }
        .btn-reset:hover { background-color: #c82333; }
        @keyframes blink { 50% { opacity: 0.6; background-color: #ffb3b3; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>LPG Gas Leakage Monitoring Terminal</h1>
    <div id="connection-status" style="color: gray; font-style: italic;">Connecting to EMQX Broker...</div>

    <div class="grid" id="node-container">
        <div class="card" id="node1"><h3>Node 1</h3><p>PPM: <b class="ppm-val">-</b></p><span class="status-badge normal">Offline</span></div>
        <div class="card" id="node2"><h3>Node 2</h3><p>PPM: <b class="ppm-val">-</b></p><span class="status-badge normal">Offline</span></div>
        <div class="card" id="node3"><h3>Node 3</h3><p>PPM: <b class="ppm-val">-</b></p><span class="status-badge normal">Offline</span></div>
        <div class="card" id="node4"><h3>Node 4</h3><p>PPM: <b class="ppm-val">-</b></p><span class="status-badge normal">Offline</span></div>
    </div>

    <br>
    <button class="btn-reset" onclick="sendRemoteReset()">Remote Reset System Alarm</button>

    <script>
        // Use EMQX public secure WebSockets port 8084
        const broker = 'wss://broker.emqx.io:8084/mqtt';
        const client = mqtt.connect(broker, { clientId: 'web_lpg_dash_' + Math.random().toString(16).substr(2, 8) });

        const topicStatus = 'lpg/system/status';
        const topicCmd = 'lpg/system/cmd';

        client.on('connect', () => {
            document.getElementById('connection-status').innerText = "Connected to EMQX Broker (Live Syncing)";
            document.getElementById('connection-status').style.color = "green";
            client.subscribe(topicStatus);
        });

        client.on('message', (topic, message) => {
            if (topic === topicStatus) {
                try {
                    const data = JSON.parse(message.toString());
                    updateDashboard(data.nodes);
                } catch (e) {
                    console.error("Error parsing payload", e);
                }
            }
        });

        function updateDashboard(nodes) {
            nodes.forEach(node => {
                const card = document.getElementById(`node${node.id}`);
                if (!card) return;

                const ppmText = card.querySelector('.ppm-val');
                const badge = card.querySelector('.status-badge');

                ppmText.innerText = node.ppm;

                // UI adjustments matching states
                if (node.crit) {
                    badge.innerText = "CRITICAL LEAK!";
                    badge.className = "status-badge critical";
                } else if (node.warn) {
                    badge.innerText = "Warning (Elevated)";
                    badge.className = "status-badge warn";
                } else {
                    badge.innerText = "Normal Operational";
                    badge.className = "status-badge normal";
                }
            });
        }

        function sendRemoteReset() {
            client.publish(topicCmd, "RESET");
            alert("Reset command dispatched to Main Hub via EMQX Broker.");
        }
        
        client.on('close', () => {
            document.getElementById('connection-status').innerText = "Disconnected from Broker. Reconnecting...";
            document.getElementById('connection-status').style.color = "red";
        });
    </script>
</body>
</html>
